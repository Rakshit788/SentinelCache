version: '3.8'

services:
  cache-node-1:
    build: .
    ports:
      - "8081:8080"
    environment:
      - PORT=8080
      - MAX_SIZE=1000
      - CLEANUP_INTERVAL=5s
    networks:
      - cache-network

  cache-node-2:
    build: .
    ports:
      - "8082:8080"
    environment:
      - PORT=8080
      - MAX_SIZE=1000
      - CLEANUP_INTERVAL=5s
    networks:
      - cache-network

  cache-node-3:
    build: .
    ports:
      - "8083:8080"
    environment:
      - PORT=8080
      - MAX_SIZE=1000
      - CLEANUP_INTERVAL=5s
    networks:
      - cache-network

networks:
  cache-network:
    driver: bridge
