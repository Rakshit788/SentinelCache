services:
  cache-node-1:
    build: .
    ports:
      - "8081:8080"
    environment:
      - PORT=8080
      - MAX_SIZE=1000
      - CLEANUP_INTERVAL=5s
    networks:
      - cache-network

  cache-node-2:
    build: .
    ports:
      - "8082:8080"
    environment:
      - PORT=8080
      - MAX_SIZE=1000
      - CLEANUP_INTERVAL=5s
    networks:
      - cache-network

  cache-node-3:
    build: .
    ports:
      - "8083:8080"
    environment:
      - PORT=8080
      - MAX_SIZE=1000
      - CLEANUP_INTERVAL=5s
    networks:
      - cache-network

  proxy:
    build: .
    command: ["./cache-proxy"]
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - NODES=http://cache-node-1:8080,http://cache-node-2:8080,http://cache-node-3:8080
      - VNODES=50
      - REPLICATION=2
    depends_on:
      - cache-node-1
      - cache-node-2
      - cache-node-3
    networks:
      - cache-network

networks:
  cache-network:
    driver: bridge
